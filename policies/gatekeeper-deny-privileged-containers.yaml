apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdenyprivilegedcontainer
  annotations:
    description: >-
      Denies Pods that set securityContext.privileged: true on any container,
      initContainer, or ephemeralContainer.
spec:
  crd:
    spec:
      names:
        kind: K8sDenyPrivilegedContainer
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenyprivilegedcontainer

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          c.securityContext.privileged == true
          msg := sprintf("Privileged container is not allowed: container %q in Pod %q", [c.name, input.review.object.metadata.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.initContainers[_]
          c.securityContext.privileged == true
          msg := sprintf("Privileged initContainer is not allowed: initContainer %q in Pod %q", [c.name, input.review.object.metadata.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.ephemeralContainers[_]
          c.securityContext.privileged == true
          msg := sprintf("Privileged ephemeralContainer is not allowed: ephemeralContainer %q in Pod %q", [c.name, input.review.object.metadata.name])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sDenyPrivilegedContainer
metadata:
  name: deny-privileged-containers
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
