apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-containers
  annotations:
    policies.kyverno.io/title: Require non-root containers
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      HIGH [SEC004]: Requires runAsNonRoot: true and rejects explicit UID 0 for
      container workloads.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          HIGH [SEC004]: Containers must set
          securityContext.runAsNonRoot: true.
        foreach:
          - list: "request.object.spec.containers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsNonRoot || false }}"
                    operator: NotEquals
                    value: true
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsNonRoot || false }}"
                    operator: NotEquals
                    value: true
    - name: deny-uid-zero
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          HIGH [SEC004]: Containers must not run as UID 0.
        foreach:
          - list: "request.object.spec.containers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsUser || -1 }}"
                    operator: Equals
                    value: 0
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsUser || -1 }}"
                    operator: Equals
                    value: 0
