apiVersion: v1
kind: Namespace
metadata:
  name: workload-restricted
  labels:
    # Pod Security Admission: enforce the strongest built-in profile.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.30

    # Keep visibility for policy drift and staged rollouts.
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.30
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.30
  annotations:
    security.container-defense-stack.io/profile: "pod-security-restricted"
    security.container-defense-stack.io/notes: "Apply to production namespaces for strict pod hardening defaults."
