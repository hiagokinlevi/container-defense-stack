apiVersion: batch/v1
kind: CronJob
metadata:
  name: secure-cronjob
  namespace: workloads
  labels:
    app.kubernetes.io/name: secure-cronjob
    app.kubernetes.io/part-of: container-defense-stack
spec:
  # Run daily at 02:30 UTC
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secure-cronjob
            app.kubernetes.io/part-of: container-defense-stack
        spec:
          serviceAccountName: secure-cronjob-sa
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: task
              image: ghcr.io/example/secure-task:1.0.0
              imagePullPolicy: IfNotPresent
              args:
                - "/app/run-task"
              securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
