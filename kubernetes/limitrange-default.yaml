apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-resource-limits
  namespace: default
  labels:
    app.kubernetes.io/name: container-defense-stack
    app.kubernetes.io/component: security-baseline
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      min:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "2"
        memory: "2Gi"
