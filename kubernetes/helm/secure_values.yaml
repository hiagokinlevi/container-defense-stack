# =============================================================================
# Helm values template — security hardening defaults
# Copy this file into your chart's values.yaml or pass it with:
#   helm install my-release ./my-chart -f secure_values.yaml
# Uncomment and adjust each section as needed for your workload.
# =============================================================================

# ---------------------------------------------------------------------------
# Pod-level security context
# Applied to every container in the pod unless overridden at container level.
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true      # The scheduler rejects the pod if it would run as UID 0.
  runAsUser: 10001        # Explicit non-root UID; match the USER in your Dockerfile.
  fsGroup: 10001          # Volumes mounted by the pod get this supplemental GID.
  seccompProfile:
    type: RuntimeDefault  # Use the container runtime's built-in seccomp profile.

# ---------------------------------------------------------------------------
# Container-level security context
# ---------------------------------------------------------------------------
securityContext:
  allowPrivilegeEscalation: false  # Block sudo/setuid escalation inside the container.
  readOnlyRootFilesystem: true      # Make the root filesystem immutable at runtime.
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL               # Drop all Linux capabilities; add back only what is required.
    # add:
    #   - NET_BIND_SERVICE  # Example: re-add only if binding to ports < 1024.

# ---------------------------------------------------------------------------
# Resource requests and limits
# Requests affect scheduling; limits cap usage to protect neighbouring pods.
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ---------------------------------------------------------------------------
# Network policy
# When enabled, the chart should render a default-deny + allow-ingress policy.
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Labels identifying pods that are allowed to send traffic to this service.
  ingressFrom:
    - podSelector:
        matchLabels:
          app: trusted-service

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  # Do not mount the service-account token unless the pod calls the K8s API.
  automountServiceAccountToken: false
  annotations: {}

# ---------------------------------------------------------------------------
# Probes — adjust paths/ports to match your application.
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# ---------------------------------------------------------------------------
# Image settings
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/hiagokinlevi/secure-app
  tag: "1.0.0"            # Never use 'latest' in production.
  pullPolicy: Always
