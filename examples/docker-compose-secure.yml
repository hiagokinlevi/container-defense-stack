version: "3.9"

services:
  web:
    image: nginx:1.27-alpine
    container_name: secure-web
    user: "101:101"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=64m
      - /var/run:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 100
    mem_limit: 256m
    cpus: "0.50"
    restart: unless-stopped
    ports:
      - "8080:8080"
    command:
      - /bin/sh
      - -c
      - >-
        sed -i 's/listen       80;/listen 8080;/' /etc/nginx/conf.d/default.conf
        && nginx -g 'daemon off;'
    networks:
      - frontend

  api:
    image: ghcr.io/example/secure-api:latest
    container_name: secure-api
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 512m
    cpus: "1.00"
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - PORT=8080
    expose:
      - "8080"
    depends_on:
      - db
    networks:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    container_name: secure-db
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run/postgresql:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 512m
    cpus: "1.00"
    restart: unless-stopped
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=change-me
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data:rw
    expose:
      - "5432"
    networks:
      - backend

networks:
  frontend:
    driver: bridge
    internal: false
  backend:
    driver: bridge
    internal: true

volumes:
  db_data:
    driver: local
