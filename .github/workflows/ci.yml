name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Install dependencies from pyproject.toml dev extras
      - run: pip install -e ".[dev]"
      # Run tests with coverage gate (70% minimum, configured in pyproject.toml)
      - run: pytest
      # Validate YAML syntax of all Kubernetes manifests in kubernetes/
      - run: python -c "import yaml,glob; [yaml.safe_load_all(open(f)) for f in glob.glob('kubernetes/**/*.yaml', recursive=True)]"
